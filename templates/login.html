<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-container">

    <h2>Login</h2>
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}
    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New User?
        <a href="/signup">Create Account</a>
    </p>

</div>

</body>
</html>
